<section class="product-list">
  <header class="product-list__header">
    <div>
      <h1>Lista de productos</h1>
      <p>Consulta los productos activos de la tienda.</p>
    </div>
    <a routerLink="/" class="button-link">Volver al dashboard</a>
  </header>

  <div *ngIf="loading()" class="state-card">Cargando productos...</div>

  <ng-container *ngIf="!loading()">
    <div class="grid">
      <article class="product-card" *ngFor="let product of pagedProducts()">
        <img [src]="product.image" [alt]="product.title" />
        <div class="product-card__body">
          <h2>{{ product.title }}</h2>
          <p class="category">{{ product.category }}</p>
          <strong>{{ product.price | currency }}</strong>
          <a [routerLink]="['/products', product.id]" class="button-link button-link--small">
            Ver detalle
          </a>
        </div>
      </article>
    </div>

    <footer class="pagination">
      <button type="button" (click)="previousPage()" [disabled]="currentPage() === 1">
        Anterior
      </button>
      <span>Pagina {{ currentPage() }} de {{ totalPages() }}</span>
      <button type="button" (click)="nextPage()" [disabled]="currentPage() === totalPages()">
        Siguiente
      </button>
    </footer>
  </ng-container>
</section>
